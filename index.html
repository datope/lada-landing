<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LADA Racing</title>
  <meta name="description" content="Drive, tune your LADA, and race with other players on a giant open-world map. Free multiplayer game on s&box." />
  <meta property="og:title" content="LADA Racing" />
  <meta property="og:description" content="Drive, tune your LADA, and race with other players on a giant open-world map." />
  <meta property="og:image" content="https://cdn.sbox.game/org/teamx/xproject/thumb/de9c8c2f-03d6-4e57-8c5f-b251e1ab70d2.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #07de20;
      --green-dim: rgba(7,222,32,0.15);
      --green-border: rgba(7,222,32,0.35);
      --discord: #5865F2;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      background: #080d12;
    }

    /* ── BACKGROUND SLIDES ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1s ease;
      transform: scale(1.04);
      transition: opacity 1s ease, transform 8s ease;
    }

    .bg-layer.active {
      opacity: 1;
      transform: scale(1.0);
      filter: brightness(0.28);
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(8,13,18,0.55) 0%,
        rgba(8,13,18,0.15) 40%,
        rgba(8,13,18,0.15) 60%,
        rgba(8,13,18,0.85) 100%
      );
      pointer-events: none;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      width: 100%; height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0;
      z-index: 1;
    }

    /* ── TOP: STATS ── */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 18px 32px;
      background: rgba(8,13,18,0.5);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .stat-item:last-child { border-right: none; }

    .stat-value {
      font-size: 18px;
      font-weight: 900;
      color: var(--green);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── CENTER: HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--green-dim);
      border: 1px solid var(--green-border);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 10px;
      letter-spacing: 2.5px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .badge-dot {
      width: 5px; height: 5px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .hero-title {
      font-size: clamp(56px, 12vw, 108px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -4px;
      background: linear-gradient(140deg, #ffffff 25%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 18px;
    }

    .hero-sub {
      font-size: 16px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      max-width: 480px;
      margin-bottom: 36px;
    }

    .hero-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      border: none;
    }

    .btn:hover { opacity: 0.82; transform: translateY(-1px); }
    .btn-primary { background: var(--green); color: #000; }
    .btn-discord { background: var(--discord); color: #fff; }

    /* ── BOTTOM: THUMBNAILS ── */
    .thumbs-bar {
      padding: 8px 20px 18px;
      background: rgba(8,13,18,0.6);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .thumbs-track {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: flex-end;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      padding-top: 8px;
    }

    .thumbs-track::-webkit-scrollbar { display: none; }

    .thumb {
      width: 100px;
      aspect-ratio: 16/9;
      border-radius: 7px;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      border: 2px solid transparent;
      transition: border-color 0.2s, opacity 0.2s, transform 0.2s;
      opacity: 0.45;
    }

    .thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb:hover { opacity: 0.75; transform: translateY(-2px); }
    .thumb.active {
      border-color: var(--green);
      opacity: 1;
      transform: translateY(-4px);
    }

    /* ── ICON HELPER ── */
    svg { display: block; }
  </style>
</head>
<body>

<!-- Background layers (one per screenshot) -->
<div id="bgLayers"></div>
<div class="bg-overlay"></div>

<div class="page">

  <!-- TOP: Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#07de20" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <div>
        <div class="stat-value">1.7K</div>
        <div class="stat-label">Players</div>
      </div>
    </div>
    <div class="stat-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#07de20" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <div>
        <div class="stat-value">2.9K</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>
    <div class="stat-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#07de20" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <div>
        <div class="stat-value">321h</div>
        <div class="stat-label">Playtime</div>
      </div>
    </div>
  </div>

  <!-- CENTER: Hero -->
  <div class="hero">
    <div class="hero-badge">
      <div class="badge-dot"></div>
      Beta Release &nbsp;·&nbsp; s&amp;box · Free
    </div>
    <h1 class="hero-title">LADA<br>Racing</h1>
    <p class="hero-sub">
      Drive, tune your LADA, and race with other players on a giant open-world map.
    </p>
    <div class="hero-btns">
      <a href="https://sbox.game/teamx/xproject" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Play Now — Free
      </a>
      <a href="https://discord.gg/5WSzPjzgta" target="_blank" rel="noopener noreferrer" class="btn btn-discord">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        Join Discord
      </a>
    </div>
  </div>

  <!-- BOTTOM: Thumbnails -->
  <div class="thumbs-bar">
    <div class="thumbs-track" id="thumbsTrack"></div>
  </div>

</div>

<script>
  const screenshots = [
    'https://cdn.sbox.game/org/teamx/xproject/screenshots/37266e92-bb6f-45b4-ace5-47d5afbc524e.jpg',
    'https://cdn.sbox.game/org/teamx/xproject/screenshots/88bc1756-d8aa-4ee9-9cca-83925c4453b9.jpg',
    'https://cdn.sbox.game/org/teamx/xproject/screenshots/11a7c231-d6bb-4426-9bd7-fde778cfb3e2.jpg',
    'https://cdn.sbox.game/org/teamx/xproject/screenshots/f88ab88f-455d-4720-b0de-f96208f36af3.jpg',
    'https://cdn.sbox.game/org/teamx/xproject/screenshots/d349db38-d902-4a02-933a-37852ef29778.jpg',
    'https://cdn.sbox.game/org/teamx/xproject/screenshots/320dc0dd-ec92-45cc-9ccd-8b3cf30c29a3.jpg',
    'https://cdn.sbox.game/org/teamx/xproject/screenshots/72ffb94b-4129-4aba-b724-6a5b068faf3c.jpg',
    'https://cdn.sbox.game/org/teamx/xproject/screenshots/e924097b-43f9-48bf-89d6-b1c247a64c07.jpg',
  ];

  let current = 0;
  let timer = null;

  // Build background layers
  const bgLayers = document.getElementById('bgLayers');
  const layers = screenshots.map((src, i) => {
    const el = document.createElement('div');
    el.className = 'bg-layer';
    el.style.backgroundImage = `url('${src}')`;
    bgLayers.appendChild(el);
    return el;
  });

  // Build thumbnails
  const track = document.getElementById('thumbsTrack');
  const thumbEls = screenshots.map((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb';
    wrap.innerHTML = `<img src="${src}" loading="lazy" alt="Screenshot ${i+1}" />`;
    wrap.addEventListener('click', () => goTo(i, true));
    track.appendChild(wrap);
    return wrap;
  });

  function goTo(index, pauseAuto) {
    layers[current].classList.remove('active');
    thumbEls[current].classList.remove('active');

    current = index;

    layers[current].classList.add('active');
    thumbEls[current].classList.add('active');
    thumbEls[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

    if (pauseAuto) {
      clearInterval(timer);
      timer = setInterval(advance, 4500);
    }
  }

  function advance() {
    goTo((current + 1) % screenshots.length, false);
  }

  // Init
  goTo(0, false);
  timer = setInterval(advance, 4500);

  // Keyboard arrows
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') goTo((current - 1 + screenshots.length) % screenshots.length, true);
    if (e.key === 'ArrowRight') goTo((current + 1) % screenshots.length, true);
  });
</script>
</body>
</html>
