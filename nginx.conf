events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Font MIME types
    types {
        font/otf               otf;
        font/ttf               ttf;
        font/woff              woff;
        font/woff2             woff2;
    }

    server {
        listen PORT;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Fonts: allow cross-origin
        location ~* \.(otf|ttf|woff|woff2)$ {
            add_header Access-Control-Allow-Origin "*";
            expires 30d;
        }

        # Static assets cache
        location ~* \.(jpg|jpeg|png|ico|css|js)$ {
            expires 7d;
        }
    }
}
